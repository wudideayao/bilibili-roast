<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站锐评 — 你的UP主账号被怼了</title>
<meta name="description" content="输入B站UID，毒舌鉴定你的UP主账号含金量">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

:root {
  --pink: #FB7299;
  --blue: #00A1D6;
  --black: #1a1a1a;
  --white: #f6f6f6;
  --gray: #444;
  --yellow: #FFD700;
  --bg: #f0eef6;
  --border: 3px solid var(--black);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--black);
  min-height: 100vh;
  overflow-x: hidden;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px;
  background: var(--white);
  border-bottom: var(--border);
  position: relative;
  z-index: 10;
}
.logo {
  font-size: 22px;
  font-weight: 900;
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-badge {
  background: var(--pink);
  color: white;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 1px;
}
.nav-actions { display: flex; gap: 8px; align-items: center; }
.nav-actions button {
  background: none;
  border: 2px solid var(--black);
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.12s;
}
.nav-actions button:hover {
  background: var(--black);
  color: white;
}

.tabs {
  display: flex;
  border-bottom: var(--border);
  background: var(--white);
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: inherit;
  position: relative;
  transition: all 0.12s;
}
.tab:hover { background: #eee; }
.tab.active {
  background: var(--black);
  color: white;
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 100%;
  height: 3px;
  background: var(--pink);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== Roast Page ===== */
.hero {
  padding: 50px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -30%;
  left: -10%;
  width: 120%;
  height: 160%;
  background:
    radial-gradient(ellipse at 25% 50%, var(--pink) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 50%, var(--blue) 0%, transparent 50%);
  opacity: 0.1;
  pointer-events: none;
}
.hero h1 {
  font-size: clamp(48px, 12vw, 100px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -3px;
}
.hero h1 .highlight {
  background: var(--black);
  color: var(--white);
  padding: 0 14px;
  display: inline-block;
  transform: rotate(-1.5deg);
}
.hero p {
  font-size: 15px;
  margin-top: 16px;
  color: var(--gray);
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}
.sticker {
  position: absolute;
  font-weight: 900;
  padding: 4px 14px;
  transform: rotate(-6deg);
  font-size: 12px;
  pointer-events: none;
  z-index: 1;
}
.sticker-1 { top: 10px; right: 5%; background: var(--yellow); color: var(--black); transform: rotate(6deg); }
.sticker-2 { bottom: 0; left: 5%; background: var(--pink); color: white; transform: rotate(-3deg); }

.input-section {
  max-width: 520px;
  margin: 0 auto 36px;
  padding: 0 24px;
}
.input-wrap {
  display: flex;
  gap: 0;
  border: var(--border);
  background: var(--white);
  box-shadow: 8px 8px 0 var(--black);
  transition: box-shadow 0.2s;
}
.input-wrap:focus-within { box-shadow: 8px 8px 0 var(--pink); }
.input-wrap input {
  flex: 1;
  border: none;
  padding: 16px 18px;
  font-size: 16px;
  font-family: inherit;
  background: transparent;
  outline: none;
}
.input-wrap input::placeholder { color: #aaa; }
.input-wrap button {
  background: var(--black);
  color: white;
  border: none;
  padding: 16px 28px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.input-wrap button:hover { background: var(--pink); }
.input-wrap button:disabled { opacity: 0.4; cursor: not-allowed; }
.input-hint {
  margin-top: 10px;
  font-size: 12px;
  color: #999;
  text-align: center;
}
.input-hint a { color: var(--blue); font-weight: 700; cursor: pointer; }

.loading {
  display: none;
  max-width: 480px;
  margin: 0 auto 40px;
  padding: 0 24px;
  text-align: center;
}
.loading.active { display: block; }
.loading-bar {
  width: 100%;
  height: 6px;
  background: #ddd;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 14px;
}
.loading-bar-inner {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--pink), var(--blue));
  border-radius: 3px;
  transition: width 0.3s;
}
.loading-text {
  font-size: 14px;
  color: var(--gray);
  animation: pulse 1.2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

.error-box {
  display: none;
  max-width: 520px;
  margin: 0 auto 40px;
  padding: 0 24px;
}
.error-box.active { display: block; }
.error-card {
  border: var(--border);
  background: var(--white);
  padding: 20px 24px;
  box-shadow: 6px 6px 0 var(--pink);
  font-size: 14px;
  line-height: 1.7;
}

.result {
  display: none;
  max-width: 620px;
  margin: 0 auto 40px;
  padding: 0 24px;
}
.result.active { display: block; }
.result-card {
  border: var(--border);
  background: var(--white);
  box-shadow: 10px 10px 0 var(--black);
  overflow: hidden;
}
.result-header {
  background: var(--black);
  color: white;
  padding: 18px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--pink);
  flex-shrink: 0;
  background: #eee;
}
.avatar img { width: 100%; height: 100%; border-radius: 50%; display: block; }
.user-meta { min-width: 0; }
.user-meta .uname { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-meta .uid { font-size: 12px; color: #999; }
.badge-grade { font-size: 40px; font-weight: 900; line-height: 1; flex-shrink: 0; }

.result-body { padding: 24px; }
.roast-text {
  font-size: 20px;
  line-height: 1.6;
  font-weight: 700;
  margin-bottom: 16px;
}
.roast-detail {
  font-size: 14px;
  line-height: 1.8;
  color: var(--gray);
  padding: 14px 18px;
  background: #f0eeea;
  border-left: 4px solid var(--pink);
  margin-bottom: 16px;
}
.ai-roast {
  display: none;
  font-size: 14px;
  line-height: 1.8;
  color: var(--gray);
  padding: 14px 18px;
  background: #fff;
  border-left: 4px solid var(--blue);
  margin-bottom: 16px;
}
.ai-roast.active { display: block; }
.ai-roast-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.data-card {
  border: 2px solid var(--black);
  padding: 16px;
  margin-bottom: 16px;
  background: var(--white);
}
.data-card h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #999;
  margin-bottom: 10px;
}
.data-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.data-item { text-align: center; padding: 8px 4px; }
.data-item .dv { font-size: 18px; font-weight: 900; }
.data-item .dl { font-size: 10px; color: #999; margin-top: 2px; }

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 18px;
}
.tag {
  border: 2px solid var(--black);
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
}
.tag.pink { background: var(--pink); color: white; border-color: var(--pink); }
.tag.blue { background: var(--blue); color: white; border-color: var(--blue); }
.tag.yellow { background: var(--yellow); color: var(--black); border-color: var(--yellow); }

.result-actions {
  display: flex;
  gap: 10px;
}
.result-actions button {
  flex: 1;
  padding: 12px;
  border: var(--border);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  background: var(--white);
  transition: all 0.12s;
}
.result-actions button:hover {
  transform: translate(-2px, -2px);
  box-shadow: 4px 4px 0 var(--black);
}
.result-actions .btn-primary {
  background: var(--black);
  color: white;
}
.result-actions .btn-primary:hover {
  background: var(--blue);
  border-color: var(--blue);
  box-shadow: 4px 4px 0 var(--blue);
}

.history-bar {
  max-width: 620px;
  margin: 0 auto 20px;
  padding: 0 24px;
}
.history-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border: 2px solid var(--black);
  background: var(--white);
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.12s;
}
.history-toggle:hover { background: var(--black); color: white; }
.history-panel {
  display: none;
  margin-top: 8px;
  border: 2px solid var(--black);
  background: var(--white);
  padding: 12px;
}
.history-panel.active { display: block; }
.history-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 8px;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 13px;
}
.history-item:hover { background: #eee; }
.history-item .hi-name { font-weight: 700; }
.history-item .hi-grade { font-size: 11px; padding: 1px 6px; border: 1px solid var(--black); }
.history-item .hi-time { font-size: 11px; color: #999; }

/* ===== Leaderboard Page ===== */
.leaderboard-page { padding: 20px 24px; max-width: 720px; margin: 0 auto; }
.lb-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.lb-controls select, .lb-controls button {
  padding: 8px 14px;
  border: 2px solid var(--black);
  background: var(--white);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
}
.lb-controls select:focus { outline: none; border-color: var(--pink); }
.lb-controls button.active { background: var(--black); color: white; }

.lb-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.lb-stat {
  border: 2px solid var(--black);
  background: var(--white);
  padding: 12px;
  text-align: center;
}
.lb-stat .lb-sv { font-size: 22px; font-weight: 900; }
.lb-stat .lb-sl { font-size: 11px; color: #999; margin-top: 2px; }

.lb-table-wrap {
  border: var(--border);
  background: var(--white);
  box-shadow: 8px 8px 0 var(--black);
  overflow: hidden;
}
.lb-row {
  display: grid;
  grid-template-columns: 40px 1fr 50px 100px 100px 60px;
  gap: 8px;
  align-items: center;
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid #eee;
}
.lb-row:hover { background: #f0eeea; }
.lb-row:last-child { border-bottom: none; }
.lb-header {
  background: var(--black);
  color: white;
  font-weight: 700;
  cursor: default;
}
.lb-header:hover { background: var(--black); }
.lb-rank { font-weight: 900; text-align: center; }
.lb-rank.gold { color: var(--yellow); }
.lb-rank.silver { color: #999; }
.lb-rank.bronze { color: #cd7f32; }
.lb-user {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.lb-avatar {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid var(--pink);
}
.lb-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-grade { text-align: center; font-weight: 900; font-size: 16px; }
.lb-count { text-align: center; color: #999; }
.lb-empty {
  text-align: center;
  padding: 40px 20px;
  color: #999;
  font-size: 14px;
}
.lb-loading {
  text-align: center;
  padding: 40px;
  color: #999;
  font-size: 14px;
}

footer {
  text-align: center;
  padding: 24px;
  border-top: var(--border);
  font-size: 12px;
  color: #999;
}
footer a { color: var(--black); font-weight: 700; }
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--black);
  color: white;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 700;
  border-radius: 4px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 500px) {
  .input-wrap { flex-direction: column; }
  .data-grid { grid-template-columns: repeat(2, 1fr); }
  .lb-row { grid-template-columns: 30px 1fr 40px 80px 80px 40px; font-size: 12px; }
  .lb-stats { grid-template-columns: 1fr; }
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--black); }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <span>B站锐评</span>
    <span class="logo-badge">毒舌版</span>
  </div>
  <div class="nav-actions">
    <button onclick="location.reload()">↻ 刷新</button>
  </div>
</nav>

<div class="tabs" role="tablist">
  <button class="tab active" data-tab="roast" role="tab" aria-selected="true">🔥 锐评</button>
  <button class="tab" data-tab="leaderboard" role="tab" aria-selected="false">🏆 排行榜</button>
</div>

<!-- ========== 锐评页 ========== -->
<div class="tab-content active" id="tab-roast" role="tabpanel">
  <div class="hero">
    <div class="sticker sticker-1">🔥 真实数据</div>
    <div class="sticker sticker-2">💀 扎心预警</div>
    <h1>被怼<br><span class="highlight">生成中</span></h1>
    <p>输入 UP 主 UID，让 AI 给你的 B 站账号来一顿毒舌锐评<br>基于 B站公开 API · 数据真实</p>
  </div>

  <div class="input-section">
    <div class="input-wrap">
      <input type="text" id="uidInput" placeholder="输入B站UID，比如 2" maxlength="20" autocomplete="off">
      <button id="roastBtn" onclick="handleRoast()">🔍 开始锐评</button>
    </div>
    <div class="input-hint">
      不知道 UID？去 UP 主个人主页看地址栏的数字 <a onclick="document.getElementById('uidInput').value='546195';handleRoast()">试试老番茄</a>
    </div>
  </div>

  <div class="history-bar">
    <button class="history-toggle" onclick="toggleHistory()">📋 查询历史</button>
    <div class="history-panel" id="historyPanel"></div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-bar"><div class="loading-bar-inner" id="loadingBar"></div></div>
    <div class="loading-text" id="loadingText">正在获取用户数据...</div>
  </div>

  <div class="error-box" id="errorBox">
    <div class="error-card" id="errorText"></div>
  </div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="result-header">
        <div class="header-left">
          <div class="avatar" id="avatarWrap"><img id="avatarImg" alt="avatar"></div>
          <div class="user-meta">
            <div class="uname" id="uname"></div>
            <div class="uid" id="uidDisplay"></div>
          </div>
        </div>
        <div class="badge-grade" id="gradeBadge"></div>
      </div>
      <div class="result-body">
        <div class="roast-text" id="roastText"></div>
        <div class="roast-detail" id="roastDetail"></div>
        <div class="ai-roast" id="aiRoast">
          <div class="ai-roast-label">🤖 AI 锐评</div>
          <div id="aiRoastText"></div>
        </div>
        <div class="tags" id="tagsWrap"></div>
        <div class="data-card">
          <h3>📊 账号数据</h3>
          <div class="data-grid">
            <div class="data-item"><div class="dv" id="dFans">0</div><div class="dl">粉丝</div></div>
            <div class="data-item"><div class="dv" id="dViews">0</div><div class="dl">总播放</div></div>
            <div class="data-item"><div class="dv" id="dLikes">0</div><div class="dl">总点赞</div></div>
            <div class="data-item"><div class="dv" id="dVideoCount">0</div><div class="dl">视频数</div></div>
          </div>
        </div>
        <div class="result-actions">
          <button class="btn-primary" onclick="shareResult()">📤 分享</button>
          <button onclick="handleReRoast()">🔄 再怼一次</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ========== 排行榜页 ========== -->
<div class="tab-content" id="tab-leaderboard" role="tabpanel">
  <div class="leaderboard-page">
    <div class="lb-controls">
      <select id="lbSort" onchange="loadLeaderboard()">
        <option value="fans">按粉丝</option>
        <option value="views">按播放</option>
        <option value="likes">按点赞</option>
        <option value="recent" selected>最新锐评</option>
      </select>
      <select id="lbPeriod" onchange="loadLeaderboard()">
        <option value="today">今日</option>
        <option value="week">本周</option>
        <option value="all" selected>全部</option>
      </select>
      <button class="active" onclick="loadLeaderboard()">🔄 刷新</button>
    </div>
    <div class="lb-stats" id="lbStats"></div>
    <div class="lb-table-wrap" id="lbTableWrap">
      <div class="lb-loading" id="lbLoading">加载中...</div>
    </div>
  </div>
</div>

<footer>
  <p>基于 B站公开 API · 仅供娱乐 · <a href="https://github.com/wudideayao/bilibili-roast" target="_blank">GitHub</a></p>
</footer>

<div class="toast" id="toast"></div>

<script>
// ========== API 地址自动检测 ==========
const IS_LOCAL = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
const API = IS_LOCAL ? '/api' : '/roast/api/v2';
const STATIC = IS_LOCAL ? '' : '/roast';

// ========== Tab 切换 ==========
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(x => { x.classList.remove('active'); x.setAttribute('aria-selected', 'false'); });
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    this.classList.add('active'); this.setAttribute('aria-selected', 'true');
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
    if (this.dataset.tab === 'leaderboard') loadLeaderboard();
  });
});

// ========== Toast 提示 ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ========== 回车搜索 ==========
document.getElementById('uidInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleRoast(); });

// ========== 加载历史 ==========
function loadHistory() {
  const panel = document.getElementById('historyPanel');
  try {
    const h = JSON.parse(localStorage.getItem('roast_history') || '[]');
    if (!h.length) { panel.innerHTML = '<div style="color:#999;font-size:12px;text-align:center;padding:8px;">暂无查询记录</div>'; return; }
    panel.innerHTML = h.slice(0, 20).map(item =>
      '<div class="history-item" onclick="historyQuery(\'' + item.uid + '\')">' +
      '<span class="hi-name">' + item.name + '</span>' +
      '<span class="hi-grade">' + item.grade + '</span>' +
      '<span class="hi-time">' + (item.time || '') + '</span></div>'
    ).join('');
  } catch (e) { panel.innerHTML = ''; }
}

function toggleHistory() {
  const panel = document.getElementById('historyPanel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) loadHistory();
}

function historyQuery(uid) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  document.querySelector('[data-tab="roast"]').classList.add('active');
  document.getElementById('tab-roast').classList.add('active');
  document.getElementById('uidInput').value = uid;
  handleRoast();
}

// ========== 保存历史 ==========
function saveHistory(uid, name, grade) {
  try {
    let h = JSON.parse(localStorage.getItem('roast_history') || '[]');
    h = h.filter(x => x.uid !== uid);
    h.unshift({ uid, name, grade, time: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) });
    if (h.length > 50) h = h.slice(0, 50);
    localStorage.setItem('roast_history', JSON.stringify(h));
  } catch (e) {}
}

// ========== 加载进度动画 ==========
function setLoadingProgress(pct, text) {
  document.getElementById('loadingBar').style.width = pct + '%';
  if (text) document.getElementById('loadingText').textContent = text;
}

// ========== 核心：锐评请求 ==========
async function handleRoast() {
  const uid = document.getElementById('uidInput').value.trim();
  if (!uid) { showToast('请输入 UID'); return; }

  const btn = document.getElementById('roastBtn');
  const loading = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const result = document.getElementById('result');

  errorBox.classList.remove('active');
  result.classList.remove('active');
  loading.classList.add('active');
  btn.disabled = true;
  setLoadingProgress(10, '正在获取用户数据...');

  try {
    const userRes = await fetch(API + '/user?mid=' + encodeURIComponent(uid));
    const userJson = await userRes.json();
    if (userJson.code !== 0 || !userJson.data) {
      throw new Error(userJson.error || '获取用户信息失败，请检查 UID 是否正确');
    }
    setLoadingProgress(50, '数据获取成功，正在生成锐评...');

    const u = userJson.data;
    const roastRes = await fetch(API + '/roast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        uid: u.uid,
        name: u.name,
        fans: u.fans,
        totalViews: u.totalViews,
        totalLikes: u.totalLikes,
        videoCount: u.videoCount,
        level: u.level,
        sign: u.sign,
        following: u.following,
      }),
    });
    const roastJson = await roastRes.json();
    if (roastJson.code !== 0) throw new Error(roastJson.error || '生成锐评失败');

    setLoadingProgress(100, '锐评生成完毕！');
    setTimeout(() => { loading.classList.remove('active'); }, 300);

    const d = roastJson;
    document.getElementById('uname').textContent = u.name;
    document.getElementById('uidDisplay').textContent = 'UID ' + u.uid;
    document.getElementById('gradeBadge').textContent = d.grade || '?';
    if (u.avatar) {
      document.getElementById('avatarImg').src = u.avatar;
      document.getElementById('avatarImg').setAttribute('referrerpolicy', 'no-referrer');
    }
    document.getElementById('roastText').textContent = d.roast || '你号没了。';
    document.getElementById('roastDetail').textContent = d.detail || '';

    // AI 锐评
    const aiEl = document.getElementById('aiRoast');
    const aiTextEl = document.getElementById('aiRoastText');
    if (d.aiRoast) {
      aiTextEl.textContent = d.aiRoast;
      aiEl.classList.add('active');
    } else {
      aiEl.classList.remove('active');
    }

    // Tags
    const tagsWrap = document.getElementById('tagsWrap');
    tagsWrap.innerHTML = '';
    if (d.tags && d.tags.length) {
      const colors = ['pink', 'blue', 'yellow'];
      d.tags.forEach((tag, i) => {
        const el = document.createElement('span');
        el.className = 'tag ' + (colors[i % 3]);
        el.textContent = tag;
        tagsWrap.appendChild(el);
      });
    }

    // 数据
    function fmt(n) {
      if (n >= 100000000) return (n / 100000000).toFixed(1) + '亿';
      if (n >= 10000) return (n / 10000).toFixed(1) + '万';
      return String(n);
    }
    document.getElementById('dFans').textContent = fmt(u.fans);
    document.getElementById('dViews').textContent = fmt(u.totalViews);
    document.getElementById('dLikes').textContent = fmt(u.totalLikes);
    document.getElementById('dVideoCount').textContent = fmt(u.videoCount);

    result.classList.add('active');

    saveHistory(u.uid, u.name, d.grade);
    btn.disabled = false;

  } catch (err) {
    loading.classList.remove('active');
    errorBox.classList.add('active');
    document.getElementById('errorText').textContent = '❌ ' + err.message;
    btn.disabled = false;
  }
}

async function handleReRoast() {
  document.getElementById('result').classList.remove('active');
  await handleRoast();
}

// ========== 分享 ==========
function shareResult() {
  const name = document.getElementById('uname').textContent;
  const grade = document.getElementById('gradeBadge').textContent;
  const roast = document.getElementById('roastText').textContent;
  const text = '【B站锐评】' + name + ' 的评级：' + grade + '\n' + roast + '\n\n来测测你的B站账号 → ' + location.origin + (STATIC || '/');
  if (navigator.share) {
    navigator.share({ title: 'B站锐评', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板')).catch(() => showToast('复制失败'));
  }
}

// ========== 排行榜 ==========
let lbCache = null;

async function loadLeaderboard() {
  const sort = document.getElementById('lbSort').value;
  const period = document.getElementById('lbPeriod').value;
  const wrap = document.getElementById('lbTableWrap');
  const statsEl = document.getElementById('lbStats');

  wrap.innerHTML = '<div class="lb-loading">加载中...</div>';

  try {
    const res = await fetch(API + '/leaderboard?sort=' + sort + '&period=' + period + '&limit=50');
    const json = await res.json();
    if (json.code !== 0) throw new Error(json.error || '加载失败');

    lbCache = json.data || [];

    // 统计数据
    const stats = json.stats || {};
    statsEl.innerHTML =
      '<div class="lb-stat"><div class="lb-sv">' + (stats.total_roasts || 0) + '</div><div class="lb-sl">总锐评次数</div></div>' +
      '<div class="lb-stat"><div class="lb-sv">' + (stats.total_users || 0) + '</div><div class="lb-sl">被锐评UP主</div></div>' +
      '<div class="lb-stat"><div class="lb-sv">' + (stats.today_roasts || 0) + '</div><div class="lb-sl">今日锐评</div></div>';

    if (!lbCache.length) {
      wrap.innerHTML = '<div class="lb-empty">暂无数据，快去锐评几个UP主吧！</div>';
      return;
    }

    let html =
      '<div class="lb-row lb-header">' +
      '<div class="lb-rank">#</div><div class="lb-user">UP主</div><div class="lb-grade">级</div><div class="lb-count">粉丝</div><div class="lb-count">播放</div><div class="lb-count">锐评</div>' +
      '</div>';

    lbCache.forEach((item, i) => {
      const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      html += '<div class="lb-row" onclick="queryUid(\'' + item.uid + '\')">' +
        '<div class="lb-rank ' + rankClass + '">' + (i + 1) + '</div>' +
        '<div class="lb-user"><div class="lb-name">' + item.uname + '</div></div>' +
        '<div class="lb-grade">' + (item.grade || '?') + '</div>' +
        '<div class="lb-count">' + fmtNum(item.fans) + '</div>' +
        '<div class="lb-count">' + fmtNum(item.total_views || item.totalViews || 0) + '</div>' +
        '<div class="lb-count">' + (item.roast_count || item.searched_count || 0) + '</div>' +
        '</div>';
    });

    wrap.innerHTML = html;
  } catch (err) {
    wrap.innerHTML = '<div class="lb-empty">加载失败：' + err.message + '</div>';
  }
}

function fmtNum(n) {
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '亿';
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  return String(n);
}

function queryUid(uid) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  document.querySelector('[data-tab="roast"]').classList.add('active');
  document.getElementById('tab-roast').classList.add('active');
  document.getElementById('uidInput').value = uid;
  handleRoast();
}

// ========== 页面加载完毕自动加载排行榜 ==========
document.addEventListener('DOMContentLoaded', function() {
  loadHistory();
});
</script>
